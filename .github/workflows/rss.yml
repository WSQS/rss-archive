name: RSS Archive

on:
    schedule:
        - cron: "19 */6 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    fetch-build-deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        env:
            ARCHIVE_BRANCH: rss-archive

        steps:
            - uses: actions/checkout@v6

            - name: Check archive branch
              id: archive_branch
              working-directory: config
              shell: bash
              run: |
                  if git ls-remote --exit-code --heads origin "${ARCHIVE_BRANCH}" > /dev/null 2>&1; then
                      echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout archive branch
              if: steps.archive_branch.outputs.exists == 'true'
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.ARCHIVE_BRANCH }}
                  path: archive
                  fetch-depth: 0
        
            - name: Initialize archive branch
              if: steps.archive_branch.outputs.exists != 'true'
              shell: bash
              run: |
                mkdir archive
                cd archive

                git init -b "${ARCHIVE_BRANCH}"
                git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

            - name: Install uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
              with:
                  enable-cache: true

            - name: Install dependencies
              run: uv sync --locked

            - name: Fetch RSS and generate notes
              run: uv run rss-archive

            - name: Commit archive updates
              working-directory: archive
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add feed-archive.json
                  git diff --cached --quiet || git commit -m "Archive RSS updates"
                  git push origin HEAD:${ARCHIVE_BRANCH}

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: data/websites

            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v4
